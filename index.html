
<!DOCTYPE html>
<html lang='ar' dir='rtl'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>صفحة تسجيل الدخول</title>
    <link rel='stylesheet' href='https://cdn.tailwindcss.com'>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap'>
    <script src='https://unpkg.com/lucide@latest/dist/umd/lucide.min.js' defer></script>
    <link rel='stylesheet' href='styles.css'>
</head>
<body class='bg-[#020617] text-[#f1f5f9]'>
    <header class='bg-[#020617] py-4'>
        <nav class='container mx-auto flex justify-between items-center'>
            <h1 class='text-3xl font-bold'>صفحة تسجيل الدخول</h1>
        </nav>
    </header>
    <main class='container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24'>
        <section class='hero-section bg-[#020617] rounded-2xl p-4 md:p-6 lg:p-12 xl:p-24'>
            <h2 class='text-4xl font-bold mb-4'>مرحباً بك!</h2>
            <p class='text-lg mb-6'>ادخل بياناتك لتسجيل الدخول</p>
            <form class='login-form' id='login-form'>
                <div class='input-field mb-4'>
                    <label for='email' class='block text-lg mb-2'>البريد الإلكتروني:</label>
                    <input type='email' id='email' class='block w-full p-2 pl-10 text-lg border border-[#6366f1] rounded-lg focus:outline-none focus:ring-[#6366f1] focus:border-[#6366f1]' placeholder='ادخل البريد الإلكتروني'>
                </div>
                <div class='input-field mb-4'>
                    <label for='password' class='block text-lg mb-2'>كلمة المرور:</label>
                    <input type='password' id='password' class='block w-full p-2 pl-10 text-lg border border-[#6366f1] rounded-lg focus:outline-none focus:ring-[#6366f1] focus:border-[#6366f1]' placeholder='ادخل كلمة المرور'>
                </div>
                <div class='input-field mb-4'>
                    <label for='confirm-password' class='block text-lg mb-2'>تأكيد كلمة المرور:</label>
                    <input type='password' id='confirm-password' class='block w-full p-2 pl-10 text-lg border border-[#6366f1] rounded-lg focus:outline-none focus:ring-[#6366f1] focus:border-[#6366f1]' placeholder='ادخل تأكيد كلمة المرور'>
                </div>
                <button type='submit' class='login-button bg-[#6366f1] hover:bg-[#818cf8] text-lg text-[#f1f5f9] py-2 px-4 rounded-lg focus:outline-none focus:ring-[#6366f1] focus:border-[#6366f1]'>تسجيل الدخول</button>
            </form>
        </section>
    </main>
    <footer class='bg-[#020617] py-4 mt-6'>
        <p class='container mx-auto text-lg text-center'>جميع الحقوق محفوظة &copy; 2024</p>
    </footer>
    <script src='app.js' defer></script>
</body>
</html>
